name: 'Build Debian Packages'
description: 'Build all HaLOS metapackages'
runs:
  using: 'composite'
  steps:
    - name: Install build dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y dpkg-dev debhelper build-essential

    - name: Build all metapackages
      shell: bash
      run: |
        for pkg in halos halos-marine halos-halpi2 halos-halpi2-marine halos-desktop halos-headless halos-desktop-marine halos-headless-marine; do
          echo "Building $pkg..."
          cd "$pkg"
          dpkg-buildpackage -b -uc -us
          mv ../*.deb ../"$pkg"/ 2>/dev/null || true
          cd ..
        done

    - name: Move packages to root
      shell: bash
      run: |
        for pkg in halos halos-marine halos-halpi2 halos-halpi2-marine halos-desktop halos-headless halos-desktop-marine halos-headless-marine; do
          mv "$pkg"/*.deb ./ 2>/dev/null || true
        done
        echo "Built packages:"
        ls -lh *.deb
